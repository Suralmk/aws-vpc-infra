name: Deploy API

on:
  push:
    branches: [main]
    paths-ignore:
      - "terraform/**"
      - "docs/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT || 'production' }}
  TF_VAR_environment: ${{ vars.ENVIRONMENT || 'production' }}
  TF_VAR_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
  TF_VAR_public_key: ${{ secrets.TF_VAR_public_key }}
  TF_VAR_bastion_allowed_cidr: ${{ vars.BASTION_ALLOWED_CIDR }}

jobs:
  deploy:
    name: Build, push to ECR, deploy via SSM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Read infrastructure outputs from remote state
        id: infra
        working-directory: .
        run: bash scripts/read-infra-outputs.sh

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: .
        env:
          ECR_REPOSITORY: ${{ steps.infra.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ ! "$ECR_REPOSITORY" =~ ^[0-9]+\.dkr\.ecr\. ]]; then
            echo "ERROR: Invalid ECR_REPOSITORY: $ECR_REPOSITORY"
            exit 1
          fi
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REPOSITORY:latest" .
          docker push "$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REPOSITORY:latest"

      - name: Deploy to backend EC2 via SSM
        working-directory: .
        env:
          IMAGE: ${{ steps.infra.outputs.ecr_repository_url }}:${{ github.sha }}
          INSTANCE_ID: ${{ steps.infra.outputs.backend_instance_id }}
          SECRET_NAME: ${{ steps.infra.outputs.db_secret_name }}
        run: |
          SCRIPT_B64=$(base64 -w 0 scripts/deploy.sh)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters "commands=[
              \"echo $SCRIPT_B64 | base64 -d > /tmp/deploy.sh\",
              \"chmod +x /tmp/deploy.sh\",
              \"export IMAGE=$IMAGE AWS_REGION=$AWS_REGION SECRET_NAME=$SECRET_NAME\",
              \"/tmp/deploy.sh\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command id: $COMMAND_ID"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)
            echo "Deploy status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "[StandardOutputContent,StandardErrorContent]" \
                --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for SSM deploy"
          exit 1

      - name: Smoke test ALB
        working-directory: .
        env:
          ALB_DNS: ${{ steps.infra.outputs.alb_dns }}
        run: |
          for i in $(seq 1 18); do
            if curl -fsS "http://${ALB_DNS}/health"; then
              echo ""
              echo "ALB health check passed"
              exit 0
            fi
            echo "Waiting for ALB target health..."
            sleep 10
          done
          echo "ALB health check failed"
          exit 1
